name: Release

# Tag a version (scripts/release.sh X.Y.Z --push) to test, build, and publish
# Séance's release artifacts: sync-server binaries for each desktop platform, a
# Docker image on GHCR, and the Android APK for the Flutter app. The desktop
# Flutter apps stay a personal build (scripts/build.sh) — they're host-native
# and unsigned; only the Android APK cross-builds on Linux, so it's the one app
# target published here.

on:
  push:
    tags: ['v*']        # e.g. v0.2.0

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # create the GitHub Release
  packages: write       # push the image to GHCR

jobs:
  # Gate the release on the pure-Dart suite — it covers the protocol, core, and
  # server that this workflow's binaries and image ship. A tag on a broken
  # commit must not publish a release. (The Flutter app's analyze+test run in
  # CI on main/PRs, so the tagged commit is already green there; the APK job
  # below still re-compiles the app, which fails the release if it won't build.)
  test:
    name: Test (release gate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      # The SQLite storage test loads libsqlite3 at runtime.
      - name: Install libsqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0
      - name: Resolve workspace
        run: dart pub get
      - name: Analyze
        run: >-
          dart analyze
          packages/seance_protocol
          packages/seance_core
          packages/seance_sync_server
      - name: Test
        run: >-
          dart test
          packages/seance_protocol
          packages/seance_core
          packages/seance_sync_server

  # Sync-server binary per desktop platform (`dart compile exe` is host-native;
  # there is no cross-compilation). Linux/macOS need libsqlite3 at runtime.
  native:
    name: Server binary (${{ matrix.platform }})
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Resolve workspace
        run: dart pub get
      - name: Compile
        shell: bash
        run: |
          mkdir -p dist
          exe=seance-sync
          if [ "${{ runner.os }}" = "Windows" ]; then exe=seance-sync.exe; fi
          dart compile exe packages/seance_sync_server/bin/seance_sync_server.dart -o "dist/$exe"
      - name: Package
        shell: bash
        run: tar -czf seance-sync-${{ matrix.platform }}.tar.gz -C dist .
      - uses: softprops/action-gh-release@v2
        with:
          files: seance-sync-${{ matrix.platform }}.tar.gz

  # Android APK for the Flutter app. The platform folders are committed (they
  # carry the app name, icons, and bundle id — AGENTS.md §3) and the release
  # build is debug-signed by design (personal tool, no Play Store), so this
  # needs no signing secrets — just the Flutter + Android toolchain, and the
  # Android SDK ships on ubuntu-latest. Version comes from the app pubspec
  # (kept in lockstep with the tag by scripts/release.sh).
  android:
    name: Android APK
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      # Match the app's compileOptions (JavaVersion.VERSION_17) so the Gradle
      # build is deterministic rather than tracking the runner's default JDK.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve app dependencies
        working-directory: app/seance_app
        run: flutter pub get
      - name: Build APK
        working-directory: app/seance_app
        run: flutter build apk --release
      # Name the asset like the sync-server tarballs (product, no version — the
      # release page already carries the version).
      - name: Stage artifact
        run: cp app/seance_app/build/app/outputs/flutter-apk/app-release.apk seance-android.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: seance-android.apk

  # Container image to GitHub Container Registry. Deployments build from source
  # (./update.sh / docker compose --build); this image is the release artifact
  # for everyone else.
  docker:
    name: Docker image
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so the pub workspace resolves
          # (same contract as the local `docker build -f … .`).
          context: .
          file: packages/seance_sync_server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

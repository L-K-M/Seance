# TEMPORARY — verifies on PR #16 that the release APK builds with the
# committed keystore and carries its exact signing certificate. Deleted again
# before merge; the permanent home of this build is release.yml's android job.
name: APK signing check (temporary)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  apk:
    name: Build + verify signature
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve app dependencies
        working-directory: app/seance_app
        run: flutter pub get
      - name: Build APK
        working-directory: app/seance_app
        run: flutter build apk --release
      - name: Verify signing certificate matches ci-release.jks
        run: |
          APKSIGNER=$(ls "$ANDROID_HOME"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs \
            app/seance_app/build/app/outputs/flutter-apk/app-release.apk | tee certs.txt
          grep -qi 'ee1c897a185604da6ca5c9bde15fb91699a34a488122637f6ea33b19d5518d53' certs.txt \
            && echo "Signature matches the committed keystore." \
            || { echo "::error::APK signature does not match ci-release.jks"; exit 1; }

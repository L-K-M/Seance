name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the jobs only need to read the repo.
permissions:
  contents: read

# Cancel an in-progress run when a *PR branch* is pushed again — but never cancel an
# in-progress run on main, or that commit is left with a permanently "cancelled"
# status (masking breakage and putting holes in CI-status bisection). GitHub can
# still supersede a *queued* main run with a newer queued one — only the running
# run is protected.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dart:
    name: Pure-Dart packages (analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      # The SQLite storage test loads libsqlite3 at runtime.
      - name: Install libsqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-0
      - name: Resolve workspace
        run: dart pub get
      - name: Analyze
        run: >-
          dart analyze
          packages/seance_protocol
          packages/seance_core
          packages/seance_sync_server
      - name: Test
        run: >-
          dart test
          packages/seance_protocol
          packages/seance_core
          packages/seance_sync_server

  flutter:
    name: Flutter app (analyze + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30   # first run downloads the Flutter toolchain
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Resolve app dependencies
        working-directory: app/seance_app
        run: flutter pub get
      - name: Analyze
        working-directory: app/seance_app
        run: flutter analyze
      - name: Test
        working-directory: app/seance_app
        run: flutter test

  # Compile every client the release workflow ships (android / linux / macos /
  # ios / windows) so a platform-breaking change is caught here, not when a tag
  # tries to publish. Mirrors release.yml's `client` job minus the packaging
  # and publishing — keep the two matrices in step.
  client:
    name: Client build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45   # first run downloads the Flutter toolchain
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: android
            build: apk --release
          - os: ubuntu-latest
            target: linux
            build: linux --release
          - os: macos-latest
            target: macos
            build: macos --release
          - os: macos-latest
            target: ios
            build: ios --release --no-codesign
          - os: windows-latest
            target: windows
            build: windows --release
    steps:
      - uses: actions/checkout@v4
      # Match the app's compileOptions (JavaVersion.VERSION_17) so the Gradle
      # build is deterministic rather than tracking the runner's default JDK.
      - uses: actions/setup-java@v4
        if: matrix.target == 'android'
        with:
          distribution: temurin
          java-version: '17'
      # GTK toolchain for the Flutter Linux embedder, plus libsecret/jsoncpp
      # for flutter_secure_storage's keyring backend.
      - name: Install Linux desktop toolchain
        if: matrix.target == 'linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev
          libsecret-1-dev libjsoncpp-dev
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      # Same ad-hoc switch as the release build: the committed project signs
      # Release with the owner's "Apple Development" identity, which no runner
      # has — and CI must exercise the exact signing path the release uses.
      - name: Switch macOS signing to ad-hoc (runner has no certificate)
        if: matrix.target == 'macos'
        run: |
          sed -i '' \
            -e 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development";/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-";/' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/' \
            -e 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/' \
            app/seance_app/macos/Runner.xcodeproj/project.pbxproj
      - name: Resolve app dependencies
        working-directory: app/seance_app
        run: flutter pub get
      - name: Build
        working-directory: app/seance_app
        run: flutter build ${{ matrix.build }}

  docker:
    name: Sync server Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f packages/seance_sync_server/Dockerfile -t seance-sync:ci .

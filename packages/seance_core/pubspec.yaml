name: seance_core
description: >-
  Platform-agnostic core for Séance: SSH session management (dartssh2),
  terminal engine abstraction, host-key TOFU store, ~/.ssh/config import,
  last-write-wins sync client, and the LLM provider layer. Pure Dart so it is
  shared unchanged by the Flutter app across every platform.
version: 0.3.2
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  seance_protocol:
    path: ../seance_protocol
  dartssh2: ^2.9.0
  http: ^1.2.0
  crypto: ^3.0.0
  meta: ^1.15.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0

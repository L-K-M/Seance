name: seance_protocol
description: >-
  Shared record model, end-to-end encryption, and sync protocol DTOs for
  Séance. Used verbatim by both the client (seance_core) and the sync server
  (seance_sync_server) so the two can never drift.
version: 0.3.0
publish_to: none
resolution: workspace

environment:
  sdk: ^3.12.0

dependencies:
  cryptography: ^2.7.0
  crypto: ^3.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0

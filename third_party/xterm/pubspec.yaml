name: xterm
# Séance's vendored fork of xterm.dart 4.0.0 (see PATCHES.md for every
# divergence from upstream). Vendored per PROPOSAL.md M2 to fix selection
# behavior that upstream's private gesture wiring makes unreachable from the
# app; libghostty replaces the whole package behind seance_core's
# TerminalEngine seam when it tags a stable release.
description: Séance's vendored fork of the xterm.dart terminal emulator (upstream 4.0.0).
version: 4.0.0+seance.1
homepage: https://github.com/TerminalStudio/xterm.dart
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  convert: ^3.0.0
  meta: ^1.3.0
  quiver: ^3.0.0
  equatable: ^2.0.3
  flutter:
    sdk: flutter
  zmodem: ^0.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.6.5
  mockito: ^5.3.1

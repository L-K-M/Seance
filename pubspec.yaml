# Séance — Dart pub workspace root.
#
# Groups the pure-Dart packages that can be built and tested without the
# Flutter SDK. The Flutter app in `app/seance_app` is intentionally NOT a
# workspace member: it requires the Flutter SDK and is resolved on its own.
name: _seance_workspace
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/seance_protocol
  - packages/seance_core
  - packages/seance_sync_server

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0

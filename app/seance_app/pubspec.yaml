name: seance_app
description: "Séance — a personal cross-platform SSH client."
publish_to: none
version: 0.2.0

environment:
  sdk: ^3.12.0
  flutter: ">=3.24.0"

dependencies:
  characters: ^1.4.0
  flutter:
    sdk: flutter
  # The entire client core lives here (SSH, TOFU, sync, LLM, vault); the app is
  # a thin UI over it. Re-exports seance_protocol.
  seance_core:
    path: ../../packages/seance_core
  # Terminal widget — Séance's vendored fork of xterm.dart 4.0.0 (selection
  # fixes upstream's private gesture wiring makes unreachable from the app;
  # see third_party/xterm/PATCHES.md). libghostty swaps in behind
  # seance_core's TerminalEngine seam when it tags a release.
  xterm:
    path: ../../third_party/xterm
  # OS keystore for the vault master key and LLM API keys.
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.0
  # The running app version (compared against the latest GitHub release to
  # offer an update notification — never to download or install anything).
  package_info_plus: ^8.0.0
  # Streams Android document-provider selections through a cached file instead
  # of requiring a stable filesystem path or loading the whole file into Dart.
  file_picker: ^11.0.2
  cross_file: ^0.3.5+4
  # Local-file drops on desktop (and Android drag/drop where the OS provides it).
  desktop_drop: ^0.7.1
  # Opens a downloaded cache file with the platform's associated application.
  open_file: ^4.0.0
  # Opens the releases page in the browser when an update is available.
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_lints: ^5.0.0
  # Regenerates every platform's launcher icon from media-sources/seance-icon.png
  # (config in flutter_launcher_icons.yaml): dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.0
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font — without it every Icons.* glyph renders
  # as the missing-glyph "?" box.
  uses-material-design: true
